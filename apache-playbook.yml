- hosts: india
  become: yes
  tasks:
    - name: Install Apache web Server
      yum:
        name: httpd
        state: present

    - name: Start Apache Web Server
      service:
        name: httpd
        state: started

    - name: Copy HTML files
      copy:
        src: index.html
        dest: /var/www/html
        mode: '0777'
